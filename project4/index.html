<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Minesweeper</title>
  </head>
  <body>
    <div id="display">
      <section id="stats">
        <h2 id="time">
          <span id="minutes">00</span>:<span id="seconds">00</span>
        </h2>
        <br />
        <br />
        <h2 id="flags">
          <span id="flagsFound">0</span>
          /10
          <img src="images/flag.png" />
        </h2>
      </section>
      <section id="settings">
        <h2>Settings</h2>
        <br />
        <br />
        <h3>Music</h3>
        <ul>
          <li><button id="songBtnCalm">Calm</button></li>
          <li><button id="songBtnCheery">Cheery</button></li>
          <li><button id="songBtnPeppy">Peppy</button></li>
        </ul>
        <br />
        <br />
        <h3>Colors</h3>
        <ul>
          <li><button id="colorBtnGrey">Grey</button></li>
          <li><button id="colorBtnGreen">Green</button></li>
          <li><button id="colorBtnBlue">Blue</button></li>
        </ul>
      </section>
    </div>
    <section id="mineGrid"></section>
    <script src="script.js"></script>
  </body>
</html>
