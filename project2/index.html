<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Color Project</title>
  </head>
  <body>
    <div id="exDiv">
      <img src="images/explosion.gif" id="exImage">
    </div>
    <div class="container" id="bigContainer">
      <h1>Howdy!</h1>
      <figure id="imageContainer">
        <img
          id="image"
          src="images/Charlie.jpg"
          alt="choose an image"
        />
        <figcaption id="imageCaption">A picture of my cat, Charlie</figcaption>
      </figure>
      <p id="remark">
        This site has a <em>TON</em> of fun features, can you figure them all
        out? 
        <br>
        <br>
         Oh, and allow autoplay and reload the site if you want to hear some music! All copyright free, don't worry.
      </p>
      <br />
      <br />
      <label for="textInput">Type something!</label>
      <input type="text" id="textInput" name="textInput" />
      <button id="submitBtn">Submit</button>
      <div id="output"></div>
      <br />
      <br />
      <div id="btnContainer">
        <button id="evilBtn">Click Me!</button>
        <br />
        <br />
        <button id="funBtn">FUN</button>
        <br />
        <br />
        <button id="nothingBtn">...</button>
        <br />
        <br />
        <div id="hiddenBtns">
          <button id="quoteBtn">Quotes</button>
          <br />
          <br />
          <button id="hideBtn">Hide</button
          <br />
          <br />
          <button id="explodeBtn">Explode</button
          <br />
          <br />
        </div>
      </div>
      <div id="rangeContainer">
        <div id="colorRange">
          <div class="rangeFlex">
            <label id="rLabel">Red</label>
            <input type="range" id="rangeRed" value="50" min="0" max="255" />
            <span id="redValue"></span>
            <br />
          </div>
          
          <div class="rangeFlex">
            <label id="gLabel">Green</label>
           <input type="range" id="rangeGreen" value="50" min="0" max="255" />
           <span id="greenValue"></span>
           <br />
          </div>

          <div class="rangeFlex">
            <label id="bLabel">Blue</label>
            <input type="range" id="rangeBlue" value="50" min="0" max="255" / >
            <span id="blueValue"></span>
           <br />
          </div>
        </div>
        <div id="imageRange">
          <div class="rangeFlex">
           <label>Horizontal</label>
            <input
            type="range"
            id="horizontalRange"
            value="50"
            min="0"
            max="100"
          />
           <span id="horizontalValue"></span>
          </div>
          <div class="rangeFlex">
            <label>Vertical</label>
            <input type="range" id="verticalRange" value="50" min="0" max="100" />
            <span id="verticalValue"></span>
        </div>
      </div>
      <div id="counter">
        <button id="counterBtn">Clicks: <span id="clicks">0</span></button>
      </div>
      <audio id="music" src="sounds/basicMusic.mp3" autoplay loop></audio>
    </div>
    <script src="script.js"></script>
  </body>
</html>
